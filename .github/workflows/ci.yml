name: ci

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest --cov=prompt_diff --cov-report=term-missing

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t prompt-diff:ci .
      - name: Smoke test
        run: |
          docker run -d --name pd -p 8096:8096 prompt-diff:ci
          for i in {1..30}; do
            if curl -fsS http://localhost:8096/health; then break; fi
            sleep 1
          done
          curl -fsS http://localhost:8096/ready
          curl -fsS -X POST http://localhost:8096/v1/diff -H "content-type: application/json" -d '{"baseline":"hello","candidate":"hello world"}'
          docker rm -f pd

  publish:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/prompt-diff
          TAG=${GITHUB_REF_NAME}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
